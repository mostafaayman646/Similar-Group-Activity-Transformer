data:
  data_dir: "/kaggle/input/datasets/mostafa646/fifa-world-cup"
  target_frames: 230

model:
  embed_dim: 256
  n_heads: 4
  frame_layers: 2
  play_layers: 2

training:
  batch_size: 8
  epochs: 50
  learning_rate: 1.0e-4
  weight_decay: 0.01
  temperature: 0.1
  clip_max_norm: 1.0
  num_workers: 3

logging:
  log_file: "training.log"
  checkpoint_dir: "checkpoints"